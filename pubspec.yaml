name: flutter_feature_generator_workspace
publish_to: none
description: >-
  Workspace root for the Flutter feature generator. Three packages:
    - packages/generator      — the generator engine + CLI + templates
    - packages/generator_mcp  — MCP server wrapper for AI IDEs
    - packages/example_app    — the Flutter playground that consumes generator output

environment:
  sdk: ^3.6.0

workspace:
  - packages/generator
  - packages/generator_mcp
  - packages/example_app
