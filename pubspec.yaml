name: flutter_feature_generator_workspace
publish_to: none
description: >-
  Workspace root for the Flutter feature generator dev tools.

  The workspace contains the pure-Dart packages only — the engine and the
  MCP wrapper. The example Flutter app (packages/example_app/) is a
  *consumer* of generator output, not an internal sibling, so it stands
  alone with its own pubspec / lockfile and is driven by `flutter pub`.
  This keeps the workspace dev loop fast (no Flutter SDK required) and
  matches Flutter users' expectations for the example project.

environment:
  sdk: ^3.6.0

workspace:
  - packages/generator
  - packages/generator_mcp
