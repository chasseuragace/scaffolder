# Mobile Optimized Template - Focused on great mobile UX
# Usage: dart run tool/generate_feature.dart User --template templates/mobile_optimized.yaml

features:
  # Architecture complexity
  simple_mode: false
  clean_architecture: true
  
  # UI Features
  pagination: true
  forms: true
  filters: true
  preview: true
  shimmer_loading: true          # Great for mobile loading states
  
  # Data & State Management
  fake_repository: true
  offline_support: true          # Essential for mobile
  optimistic_updates: true       # Better perceived performance
  stream_based: false
  
  # Error Handling & UX
  advanced_error_handling: true
  retry_mechanisms: true         # Handle poor mobile connections
  inline_loading: true           # Better than blocking dialogs on mobile
  toast_notifications: true     # Less intrusive on mobile
  
  # Development & Testing
  generic_base_classes: true
  mock_data_generation: true
  unit_tests: false
  integration_tests: false
  
  # Code Generation
  asset_generation: false
  json_serialization: true
  equatable_support: false