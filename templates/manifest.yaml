# Manifest of templates to render.
#
# Each entry:
#   template: path under templates/ to the .dart.tmpl source
#   output:   destination path; supports {{module_snake}} / {{Module}} substitution
#   when:     optional flag name; entry is skipped unless the flag is true
#   once:     if true, the entry is generated once per project (not per feature)

core:
  - template: core/failures.dart.tmpl
    output: lib/core/errors/failures.dart
    once: true
  - template: core/usecase.dart.tmpl
    output: lib/core/usecase/usecase.dart
    once: true
  - template: core/debouncer.dart.tmpl
    output: lib/core/utils/debouncer.dart
    once: true
    when: search
  - template: core/error_view.dart.tmpl
    output: lib/core/widgets/error_view.dart
    once: true
  - template: core/empty_view.dart.tmpl
    output: lib/core/widgets/empty_view.dart
    once: true
  - template: core/shimmer_tile.dart.tmpl
    output: lib/core/widgets/shimmer_tile.dart
    once: true
    when: shimmer_loading
  - template: core/feature_registry.dart.tmpl
    output: lib/core/routing/feature_registry.dart
    once: true
    preserve: true
  - template: core/pagination.dart.tmpl
    output: lib/core/pagination/pagination.dart
    once: true
    when: pagination

feature:
  # Domain layer
  - template: feature/domain/entity.dart.tmpl
    output: lib/features/{{module_snake}}/domain/entities/{{module_snake}}_entity.dart
  - template: feature/domain/repository.dart.tmpl
    output: lib/features/{{module_snake}}/domain/repositories/{{module_snake}}_repository.dart
  - template: feature/domain/usecases.dart.tmpl
    output: lib/features/{{module_snake}}/domain/usecases/{{module_snake}}_usecases.dart

  # Data layer
  - template: feature/data/model.dart.tmpl
    output: lib/features/{{module_snake}}/data/models/{{module_snake}}_model.dart
  - template: feature/data/repository_impl.dart.tmpl
    output: lib/features/{{module_snake}}/data/repositories/{{module_snake}}_repository_impl.dart
  - template: feature/data/repository_fake.dart.tmpl
    output: lib/features/{{module_snake}}/data/repositories/{{module_snake}}_repository_fake.dart
    when: fake_repository

  # Presentation layer
  - template: feature/presentation/providers.dart.tmpl
    output: lib/features/{{module_snake}}/presentation/providers/{{module_snake}}_providers.dart
  - template: feature/presentation/list_page.dart.tmpl
    output: lib/features/{{module_snake}}/presentation/pages/{{module_snake}}_list_page.dart
  - template: feature/presentation/item_tile.dart.tmpl
    output: lib/features/{{module_snake}}/presentation/widgets/{{module_snake}}_item_tile.dart
  - template: feature/presentation/form_dialog.dart.tmpl
    output: lib/features/{{module_snake}}/presentation/widgets/{{module_snake}}_form_dialog.dart
    when: forms
  - template: feature/presentation/search_delegate.dart.tmpl
    output: lib/features/{{module_snake}}/presentation/widgets/{{module_snake}}_search_delegate.dart
    when: search

  # Public surface — module registration
  - template: feature/module.dart.tmpl
    output: lib/features/{{module_snake}}/{{module_snake}}_module.dart

  # Tests
  - template: feature/test/repository_fake_test.dart.tmpl
    output: test/features/{{module_snake}}/{{module_snake}}_repository_fake_test.dart
    when: unit_tests
