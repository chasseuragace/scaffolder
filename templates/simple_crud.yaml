# Simple CRUD Template - Minimal files for basic operations
# Usage: dart run tool/generate_feature.dart User --template templates/simple_crud.yaml

features:
  # Architecture complexity
  simple_mode: true               # Generate minimal files only
  clean_architecture: false      # Skip full Clean Architecture layers
  
  # UI Features
  pagination: false
  forms: true
  filters: false
  preview: false
  shimmer_loading: false
  
  # Data & State Management
  fake_repository: true
  offline_support: false
  optimistic_updates: true        # Better UX
  stream_based: false
  
  # Error Handling & UX
  advanced_error_handling: true   # Always good to have
  retry_mechanisms: false
  inline_loading: true            # Better UX than dialogs
  toast_notifications: false
  
  # Development & Testing
  generic_base_classes: false     # Keep it simple
  mock_data_generation: true      # Useful for testing
  unit_tests: false
  integration_tests: false
  
  # Code Generation
  asset_generation: false
  json_serialization: true
  equatable_support: false

# Simplified generate structure for basic CRUD
generate:
  - category: data
    contents:
      - folder: models
        contents:
          - file: model.dart
            code: |
              /// Simple ModuleName model
              class ModuleNameModel {
                final String id;
                final String? name;
                final String? description;
                final DateTime? createdAt;
                final DateTime? updatedAt;

                const ModuleNameModel({
                  required this.id,
                  this.name,
                  this.description,
                  this.createdAt,
                  this.updatedAt,
                });

                factory ModuleNameModel.fromJson(Map<String, dynamic> json) {
                  return ModuleNameModel(
                    id: json['id'] as String,
                    name: json['name'] as String?,
                    description: json['description'] as String?,
                    createdAt: json['created_at'] != null 
                        ? DateTime.parse(json['created_at'] as String) 
                        : null,
                    updatedAt: json['updated_at'] != null 
                        ? DateTime.parse(json['updated_at'] as String) 
                        : null,
                  );
                }

                Map<String, dynamic> toJson() {
                  return {
                    'id': id,
                    'name': name,
                    'description': description,
                    'created_at': createdAt?.toIso8601String(),
                    'updated_at': updatedAt?.toIso8601String(),
                  };
                }

                {% if features.mock_data_generation %}
                factory ModuleNameModel.dummy({String? id, int? index}) {
                  final random = DateTime.now().millisecondsSinceEpoch + (index ?? 0);
                  return ModuleNameModel(
                    id: id ?? 'item_$random',
                    name: 'Sample Item ${index ?? random % 100}',
                    description: 'This is a sample description for testing',
                    createdAt: DateTime.now().subtract(Duration(days: random % 30)),
                    updatedAt: DateTime.now().subtract(Duration(days: random % 10)),
                  );
                }
                {% endif %}
              }

  - category: presentation
    contents:
      - folder: providers
        contents:
          - file: providers.dart
            code: |
              import 'package:flutter_riverpod/flutter_riverpod.dart';
              import '../../data/models/model.dart';

              /// Simple ModuleName provider
              class ModuleNameNotifier extends StateNotifier<List<ModuleNameModel>> {
                ModuleNameNotifier() : super([]);

                {% if features.optimistic_updates %}
                void addItem(ModuleNameModel item) {
                  // Optimistic update
                  state = [...state, item];
                  // TODO: Add API call here
                }

                void updateItem(ModuleNameModel updatedItem) {
                  // Optimistic update
                  state = state.map((item) => 
                    item.id == updatedItem.id ? updatedItem : item
                  ).toList();
                  // TODO: Add API call here
                }

                void deleteItem(String id) {
                  // Optimistic update
                  state = state.where((item) => item.id != id).toList();
                  // TODO: Add API call here
                }
                {% else %}
                Future<void> addItem(ModuleNameModel item) async {
                  // TODO: Add API call here
                  state = [...state, item];
                }

                Future<void> updateItem(ModuleNameModel updatedItem) async {
                  // TODO: Add API call here
                  state = state.map((item) => 
                    item.id == updatedItem.id ? updatedItem : item
                  ).toList();
                }

                Future<void> deleteItem(String id) async {
                  // TODO: Add API call here
                  state = state.where((item) => item.id != id).toList();
                }
                {% endif %}

                {% if features.mock_data_generation %}
                void loadMockData() {
                  state = List.generate(10, (index) => ModuleNameModel.dummy(index: index));
                }
                {% endif %}
              }

              final moduleNameProvider = StateNotifierProvider<ModuleNameNotifier, List<ModuleNameModel>>(
                (ref) => ModuleNameNotifier(),
              );

      - folder: pages
        contents:
          - file: list_page.dart
            code: |
              import 'package:flutter/material.dart';
              import 'package:flutter_riverpod/flutter_riverpod.dart';
              import '../../data/models/model.dart';
              import '../providers/providers.dart';

              class ModuleNameListPage extends ConsumerWidget {
                const ModuleNameListPage({super.key});

                @override
                Widget build(BuildContext context, WidgetRef ref) {
                  final items = ref.watch(moduleNameProvider);

                  return Scaffold(
                    appBar: AppBar(
                      title: const Text('ModuleName List'),
                      {% if features.mock_data_generation %}
                      actions: [
                        IconButton(
                          icon: const Icon(Icons.refresh),
                          onPressed: () => ref.read(moduleNameProvider.notifier).loadMockData(),
                        ),
                      ],
                      {% endif %}
                    ),
                    body: items.isEmpty
                        ? const Center(child: Text('No items found'))
                        : ListView.builder(
                            itemCount: items.length,
                            itemBuilder: (context, index) {
                              final item = items[index];
                              return ListTile(
                                title: Text(item.name ?? 'Unnamed'),
                                subtitle: Text(item.description ?? ''),
                                trailing: IconButton(
                                  icon: const Icon(Icons.delete),
                                  onPressed: () => ref.read(moduleNameProvider.notifier).deleteItem(item.id),
                                ),
                              );
                            },
                          ),
                    floatingActionButton: FloatingActionButton(
                      onPressed: () {
                        final newItem = ModuleNameModel.dummy();
                        ref.read(moduleNameProvider.notifier).addItem(newItem);
                      },
                      child: const Icon(Icons.add),
                    ),
                  );
                }
              }