              import 'package:flutter/material.dart';
              import 'package:flutter_riverpod/flutter_riverpod.dart';
              import '../../data/models/model.dart';
              import '../../domain/entities/entity.dart';
              import '../providers/providers.dart';
              import '../widgets/base_widgets.dart';
              import '../widgets/crud_listener.dart';
              import '../widgets/shimmer_loading.dart';
              import 'widgets/module_name_form_dialog.dart';
              import 'widgets/module_name_item_tile.dart';
              import 'widgets/module_name_search_delegate.dart';
              import '../../domain/entities/paginated_response.dart';

              /// ModuleName list page with pagination
              class ModuleNameListPage extends ConsumerStatefulWidget {
                const ModuleNameListPage({super.key});

                @override
                ConsumerState<ModuleNameListPage> createState() => _ModuleNameListPageState();
              }

              class _ModuleNameListPageState extends ConsumerState<ModuleNameListPage> {
                final ScrollController _scrollController = ScrollController();
                final TextEditingController _searchController = TextEditingController();

                @override
                void initState() {
                  super.initState();
                  _scrollController.addListener(_scrollListener);
                }

                @override
                void dispose() {
                  _scrollController.dispose();
                  _searchController.dispose();
                  super.dispose();
                }

                void _scrollListener() {
                  if (_scrollController.position.pixels >= 
                      _scrollController.position.maxScrollExtent - 200) {
                    ref.read(getAllModuleNamePaginatedProvider.notifier).loadMore();
                  }
                }

                @override
                Widget build(BuildContext context) {
                  final paginatedState = ref.watch(getAllModuleNamePaginatedProvider);

                  return MultiProviderCrudListener(
                    providerConfigs: {
                      addModuleNameProvider: const CrudListenerConfig(
                        loadingMessage: 'Adding item...',
                        successMessage: 'Item added successfully',
                      ),
                      updateModuleNameProvider: const CrudListenerConfig(
                        loadingMessage: 'Updating item...',
                        successMessage: 'Item updated successfully',
                      ),
                      deleteModuleNameProvider: const CrudListenerConfig(
                        loadingMessage: 'Deleting item...',
                        successMessage: 'Item deleted successfully',
                      ),
                    },
                    child: Scaffold(
                      appBar: AppBar(
                        title: const Text('ModuleName List'),
                        actions: [
                          IconButton(
                            icon: const Icon(Icons.search),
                            onPressed: () => showSearch(
                              context: context,
                              delegate: ModuleNameSearchDelegate(),
                            ),
                          ),
                          IconButton(
                            icon: const Icon(Icons.refresh),
                            onPressed: () => ref.invalidate(getAllModuleNamePaginatedProvider),
                          ),
                        ],
                        bottom: PreferredSize(
                          preferredSize: const Size.fromHeight(60),
                          child: Padding(
                            padding: const EdgeInsets.all(8.0),
                            child: TextField(
                              controller: _searchController,
                              decoration: InputDecoration(
                                hintText: 'Search ModuleName...',
                                prefixIcon: const Icon(Icons.search),
                                suffixIcon: _searchController.text.isNotEmpty
                                    ? IconButton(
                                        icon: const Icon(Icons.clear),
                                        onPressed: () {
                                          _searchController.clear();
                                          ref.read(getAllModuleNamePaginatedProvider.notifier)
                                              .search('');
                                        },
                                      )
                                    : null,
                                border: OutlineInputBorder(
                                  borderRadius: BorderRadius.circular(8),
                                ),
                                contentPadding: const EdgeInsets.symmetric(
                                  horizontal: 16,
                                  vertical: 8,
                                ),
                              ),
                              onChanged: (value) {
                                ref.read(getAllModuleNamePaginatedProvider.notifier)
                                    .search(value);
                              },
                            ),
                          ),
                        ),
                      ),
                      body: RefreshIndicator(
                        onRefresh: () async {
                          ref.invalidate(getAllModuleNamePaginatedProvider);
                        },
                        child: AsyncStateBuilder<PaginatedResponse<ModuleNameEntity>>(
                          state: paginatedState,
                          builder: (data) => _buildList(data),
                          loadingBuilder: () => const ModuleNameShimmerList(),
                          emptyBuilder: () => const EmptyStateWidget(
                            title: 'No items found',
                            subtitle: 'Add your first ModuleName to get started',
                            icon: Icons.inbox,
                          ),
                        ),
                      ),
                      floatingActionButton: FloatingActionButton(
                        onPressed: () => _showAddDialog(),
                        child: const Icon(Icons.add),
                      ),
                    ),
                  );
                }

                Widget _buildList(PaginatedResponse<ModuleNameEntity> data) {
                  if (data.items.isEmpty) {
                    return const EmptyStateWidget(
                      title: 'No items found',
                      subtitle: 'Try adjusting your search or add a new item',
                      icon: Icons.search_off,
                    );
                  }

                  return Column(
                    children: [
                      Expanded(
                        child: ListView.builder(
                          controller: _scrollController,
                          itemCount: data.items.length + (data.hasMore ? 1 : 0),
                          itemBuilder: (context, index) {
                            if (index == data.items.length) {
                              return data.isPaginating
                                  ? const Padding(
                                      padding: EdgeInsets.all(16),
                                      child: Center(child: CircularProgressIndicator()),
                                    )
                                  : const SizedBox.shrink();
                            }

                            final item = data.items[index];
                            return ModuleNameItemTile(
                              item: item,
                              onTap: () => _showDetailDialog(item),
                              onEdit: () => _showEditDialog(item),
                              onDelete: () => _showDeleteConfirmation(item.id),
                            );
                          },
                        ),
                      ),
                      if (data.isPaginating)
                        const LinearProgressIndicator(),
                    ],
                  );
                }

                void _showAddDialog() {
                  showDialog(
                    context: context,
                    builder: (_) => ModuleNameFormDialog(
                      onSave: (name, description) {
                        final newItem = ModuleNameModel(
                          id: DateTime.now().millisecondsSinceEpoch.toString(),
                          name: name,
                          description: description,
                          createdAt: DateTime.now(),
                          updatedAt: DateTime.now(),
                          rawJson: {},
                        );
                        ref.read(addModuleNameProvider.notifier).addModuleName(newItem);
                      },
                    ),
                  );
                }

                void _showEditDialog(ModuleNameEntity item) {
                  showDialog(
                    context: context,
                    builder: (_) => ModuleNameFormDialog(
                      item: item,
                      onSave: (name, description) {
                        final updatedItem = ModuleNameModel(
                          id: item.id,
                          name: name,
                          description: description,
                          createdAt: item.createdAt,
                          updatedAt: DateTime.now(),
                          rawJson: item.rawJson ?? {},
                        );
                        ref.read(updateModuleNameProvider.notifier).updateModuleName(updatedItem);
                      },
                    ),
                  );
                }

                void _showDetailDialog(ModuleNameEntity item) {
                  showDialog(
                    context: context,
                    builder: (_) => AlertDialog(
                      title: Text(item.name ?? 'ModuleName Details'),
                      content: Column(
                        mainAxisSize: MainAxisSize.min,
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('ID: ${item.id}'),
                          const SizedBox(height: 8),
                          if (item.description != null) ...[
                            Text('Description: ${item.description}'),
                            const SizedBox(height: 8),
                          ],
                          if (item.createdAt != null) ...[
                            Text('Created: ${item.createdAt}'),
                            const SizedBox(height: 8),
                          ],
                          if (item.updatedAt != null)
                            Text('Updated: ${item.updatedAt}'),
                        ],
                      ),
                      actions: [
                        TextButton(
                          onPressed: () => Navigator.of(context).pop(),
                          child: const Text('Close'),
                        ),
                        TextButton(
                          onPressed: () {
                            Navigator.of(context).pop();
                            _showEditDialog(item);
                          },
                          child: const Text('Edit'),
                        ),
                      ],
                    ),
                  );
                }

                void _showDeleteConfirmation(String id) {
                  showDialog(
                    context: context,
                    builder: (_) => ConfirmationDialog(
                      title: 'Delete Item',
                      content: 'Are you sure you want to delete this item? This action cannot be undone.',
                      confirmText: 'Delete',
                      confirmColor: Colors.red,
                      onConfirm: () {
                        ref.read(deleteModuleNameProvider.notifier).deleteModuleName(id);
                      },
                    ),
                  );
                }
              }

