              /// Non-paginated list provider
              class GetAllModuleNameNotifier extends BaseListNotifier<ModuleNameEntity> {
                @override
                Future<List<ModuleNameEntity>> build() async {
                  final result = await ref.read(getAllModuleNameUseCaseProvider)(const NoParams());
                  return result.fold(
                    (failure) => throw mapFailureToException(failure),
                    (items) => items,
                  );
                }

                Future<void> refresh() async {
                  ref.invalidateSelf();
                }
              }

              /// Paginated list provider
              class GetAllModuleNamePaginatedNotifier 
                  extends AsyncNotifier<PaginatedResponse<ModuleNameEntity>> {
                int _page = 1;
                bool _hasMore = true;
                String? _searchQuery;
                final List<ModuleNameEntity> _items = [];
                final Debouncer _debouncer = Debouncer(const Duration(milliseconds: 300));

                @override
                Future<PaginatedResponse<ModuleNameEntity>> build() async {
                  _page = 1;
                  _hasMore = true;
                  _searchQuery = null;
                  _items.clear();
                  return _fetchData();
                }

                Future<void> refresh() async {
                  _page = 1;
                  _hasMore = true;
                  _items.clear();
                  ref.invalidateSelf();
                }

                Future<void> loadMore() async {
                  if (!_hasMore || state.isLoading) return;
                  
                  // Show loading indicator for pagination
                  state = AsyncValue.data(
                    state.value!.copyWith(isPaginating: true),
                  );
                  
                  _debouncer.run(() async {
                    _page++;
                    final newData = await _fetchData();
                    state = AsyncValue.data(newData);
                  });
                }

                Future<void> search(String query) async {
                  _searchQuery = query.isEmpty ? null : query;
                  _page = 1;
                  _hasMore = true;
                  _items.clear();
                  
                  _debouncer.run(() async {
                    final newData = await _fetchData();
                    state = AsyncValue.data(newData);
                  });
                }

                Future<PaginatedResponse<ModuleNameEntity>> _fetchData() async {
                  final params = PaginationParams(
                    page: _page,
                    limit: 20,
                    search: _searchQuery,
                  );

                  final result = await ref.read(getAllModuleNamePaginatedUseCaseProvider)(params);

                  return result.fold(
                    (failure) => throw _mapFailureToException(failure),
                    (paginated) {
                      _hasMore = paginated.hasMore;
                      
                      if (_page == 1) {
                        _items.clear();
                      }
                      _items.addAll(paginated.items);
                      
                      return PaginatedResponse<ModuleNameEntity>(
                        items: List.from(_items),
                        hasMore: paginated.hasMore,
                        totalPages: paginated.totalPages,
                        currentPage: _page,
                        totalItems: paginated.totalItems,
                        isPaginating: false,
                      );
                    },
                  );
                }

                Exception _mapFailureToException(Failure failure) {
                  return switch (failure) {
                    NetworkFailure() => Exception('Network error occurred'),
                    ServerFailure() => Exception('Server error occurred'),
                    TimeoutFailure() => Exception('Request timeout'),
                    CacheFailure() => Exception('Cache error occurred'),
                    ValidationFailure() => Exception('Validation error occurred'),
                    NotFoundFailure() => Exception('Items not found'),
                    UnauthorizedFailure() => Exception('Unauthorized access'),
                    ForbiddenFailure() => Exception('Access forbidden'),
                    UnexpectedFailure() => Exception('An unexpected error occurred'),
                    _ => Exception('Unknown error occurred'),
                  };
                }

                void dispose() {
                  _debouncer.dispose();
                }
              }

