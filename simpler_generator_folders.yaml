          - file: debouncer.dart
            code: |
              import 'dart:async';
              import 'package:flutter/widgets.dart';

              /// Utility class to debounce function calls
              class Debouncer {
                final Duration delay;
                Timer? _timer;

                Debouncer(this.delay);

                void run(VoidCallback action) {
                  _timer?.cancel();
                  _timer = Timer(delay, action);
                }

                void dispose() {
                  _timer?.cancel();
                }
              }

