              import '../../domain/entities/entity.dart';

              /// ModuleName data model
              class ModuleNameModel extends ModuleNameEntity {
                const ModuleNameModel({
                  required super.id,
                  super.name,
                  super.description,
                  super.createdAt,
                  super.updatedAt,
                  super.rawJson,
                });

                /// Create from JSON
                factory ModuleNameModel.fromJson(Map<String, dynamic> json) {
                  return ModuleNameModel(
                    id: json['id'] as String,
                    name: json['name'] as String?,
                    description: json['description'] as String?,
                    createdAt: json['created_at'] != null 
                        ? DateTime.parse(json['created_at'] as String) 
                        : null,
                    updatedAt: json['updated_at'] != null 
                        ? DateTime.parse(json['updated_at'] as String) 
                        : null,
                    rawJson: json,
                  );
                }

                /// Convert to JSON
                Map<String, dynamic> toJson() {
                  return {
                    'id': id,
                    'name': name,
                    'description': description,
                    'created_at': createdAt?.toIso8601String(),
                    'updated_at': updatedAt?.toIso8601String(),
                  };
                }

                /// Create dummy instance for testing
                factory ModuleNameModel.dummy({String? id, int? index}) {
                  final random = DateTime.now().millisecondsSinceEpoch + (index ?? 0);
                  final sampleNames = [
                    'Sample ModuleName Alpha',
                    'Test ModuleName Beta', 
                    'Demo ModuleName Gamma',
                    'Mock ModuleName Delta',
                    'Example ModuleName Epsilon',
                  ];
                  final sampleDescriptions = [
                    'This is a comprehensive sample ModuleName for testing purposes',
                    'A detailed test ModuleName with various properties',
                    'Demo ModuleName showcasing different features',
                    'Mock data for ModuleName with realistic content',
                    'Example ModuleName demonstrating typical usage',
                  ];
                  
                  final nameIndex = random % sampleNames.length;
                  final descIndex = random % sampleDescriptions.length;
                  final createdDaysAgo = random % 30;
                  final updatedDaysAgo = random % createdDaysAgo.clamp(1, 30);
                  
                  return ModuleNameModel(
                    id: id ?? 'module_${random}_${nameIndex}',
                    name: sampleNames[nameIndex],
                    description: sampleDescriptions[descIndex],
                    createdAt: DateTime.now().subtract(Duration(days: createdDaysAgo)),
                    updatedAt: DateTime.now().subtract(Duration(days: updatedDaysAgo)),
                    rawJson: {
                      'generated': true,
                      'index': index ?? 0,
                      'category': ['work', 'personal', 'test', 'demo'][random % 4],
                      'priority': ['low', 'medium', 'high'][random % 3],
                    },
                  );
                }
                
                /// Generate a list of dummy instances
                static List<ModuleNameModel> generateDummyList(int count) {
                  return List.generate(count, (index) => ModuleNameModel.dummy(index: index));
                }

                /// Convert to entity
                ModuleNameEntity toEntity() => this;

                @override
                ModuleNameModel copyWith({
                  String? id,
                  String? name,
                  String? description,
                  DateTime? createdAt,
                  DateTime? updatedAt,
                  Map<String, dynamic>? rawJson,
                }) {
                  return ModuleNameModel(
                    id: id ?? this.id,
                    name: name ?? this.name,
                    description: description ?? this.description,
                    createdAt: createdAt ?? this.createdAt,
                    updatedAt: updatedAt ?? this.updatedAt,
                    rawJson: rawJson ?? this.rawJson,
                  );
                }
              }

