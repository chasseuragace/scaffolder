              import '../models/model.dart';
              import '../../domain/entities/pagination_params.dart';
              import '../../domain/entities/paginated_response.dart';

              /// Local data source interface
              abstract class ModuleNameLocalDataSource {
                Future<List<ModuleNameModel>> getAllItems();
                Future<PaginatedResponse<ModuleNameModel>> getAllItemsPaginated(
                    PaginationParams params);
                Future<ModuleNameModel?> getItemById(String id);
                Future<void> addItem(ModuleNameModel model);
                Future<void> updateItem(ModuleNameModel model);
                Future<void> deleteItem(String id);
                Future<List<ModuleNameModel>> searchItems(String query);
                Future<void> addItems(List<ModuleNameModel> models);
                Future<void> deleteItems(List<String> ids);
                Future<void> clearCache();
              }

              /// Local data source implementation
              class ModuleNameLocalDataSourceImpl implements ModuleNameLocalDataSource {
                // In-memory cache for demo purposes
                // In real app, use Hive, SQLite, or other local storage
                final List<ModuleNameModel> _cache = [];

                @override
                Future<List<ModuleNameModel>> getAllItems() async {
                  await Future.delayed(const Duration(milliseconds: 100));
                  return List.from(_cache);
                }

                @override
                Future<PaginatedResponse<ModuleNameModel>> getAllItemsPaginated(
                    PaginationParams params) async {
                  await Future.delayed(const Duration(milliseconds: 100));
                  
                  final startIndex = (params.page - 1) * params.limit;
                  final endIndex = startIndex + params.limit;
                  
                  var filteredItems = _cache;
                  
                  // Apply search filter
                  if (params.search != null && params.search!.isNotEmpty) {
                    filteredItems = _cache.where((item) =>
                        item.name?.toLowerCase().contains(params.search!.toLowerCase()) == true ||
                        item.description?.toLowerCase().contains(params.search!.toLowerCase()) == true
                    ).toList();
                  }
                  
                  final items = filteredItems.skip(startIndex).take(params.limit).toList();
                  
                  return PaginatedResponse<ModuleNameModel>(
                    items: items,
                    hasMore: endIndex < filteredItems.length,
                    totalPages: (filteredItems.length / params.limit).ceil(),
                    currentPage: params.page,
                    totalItems: filteredItems.length,
                  );
                }

                @override
                Future<ModuleNameModel?> getItemById(String id) async {
                  await Future.delayed(const Duration(milliseconds: 50));
                  try {
                    return _cache.firstWhere((item) => item.id == id);
                  } catch (e) {
                    return null;
                  }
                }

                @override
                Future<void> addItem(ModuleNameModel model) async {
                  await Future.delayed(const Duration(milliseconds: 100));
                  _cache.add(model);
                }

                @override
                Future<void> updateItem(ModuleNameModel model) async {
                  await Future.delayed(const Duration(milliseconds: 100));
                  final index = _cache.indexWhere((item) => item.id == model.id);
                  if (index != -1) {
                    _cache[index] = model;
                  }
                }

                @override
                Future<void> deleteItem(String id) async {
                  await Future.delayed(const Duration(milliseconds: 100));
                  _cache.removeWhere((item) => item.id == id);
                }

                @override
                Future<List<ModuleNameModel>> searchItems(String query) async {
                  await Future.delayed(const Duration(milliseconds: 150));
                  return _cache.where((item) =>
                      item.name?.toLowerCase().contains(query.toLowerCase()) == true ||
                      item.description?.toLowerCase().contains(query.toLowerCase()) == true
                  ).toList();
                }

                @override
                Future<void> addItems(List<ModuleNameModel> models) async {
                  await Future.delayed(const Duration(milliseconds: 200));
                  _cache.addAll(models);
                }

                @override
                Future<void> deleteItems(List<String> ids) async {
                  await Future.delayed(const Duration(milliseconds: 200));
                  _cache.removeWhere((item) => ids.contains(item.id));
                }

                @override
                Future<void> clearCache() async {
                  _cache.clear();
                }
              }

