                code: |
                  import 'package:flutter/material.dart';
                  import '../../../domain/entities/entity.dart';

                  /// Form dialog for adding/editing ModuleName
                  class ModuleNameFormDialog extends StatefulWidget {
                    final ModuleNameEntity? item;
                    final void Function(String name, String? description) onSave;

                    const ModuleNameFormDialog({
                      super.key,
                      this.item,
                      required this.onSave,
                    });

                    @override
                    State<ModuleNameFormDialog> createState() => _ModuleNameFormDialogState();
                  }

                  class _ModuleNameFormDialogState extends State<ModuleNameFormDialog> {
                    final _formKey = GlobalKey<FormState>();
                    late final TextEditingController _nameController;
                    late final TextEditingController _descriptionController;

                    @override
                    void initState() {
                      super.initState();
                      _nameController = TextEditingController(text: widget.item?.name ?? '');
                      _descriptionController = TextEditingController(text: widget.item?.description ?? '');
                    }

                    @override
                    void dispose() {
                      _nameController.dispose();
                      _descriptionController.dispose();
                      super.dispose();
                    }

                    @override
                    Widget build(BuildContext context) {
                      final isEditing = widget.item != null;

                      return AlertDialog(
                        title: Text(isEditing ? 'Edit ModuleName' : 'Add ModuleName'),
                        content: Form(
                          key: _formKey,
                          child: Column(
                            mainAxisSize: MainAxisSize.min,
                            children: [
                              TextFormField(
                                controller: _nameController,
                                decoration: const InputDecoration(
                                  labelText: 'Name *',
                                  border: OutlineInputBorder(),
                                ),
                                validator: (value) {
                                  if (value == null || value.trim().isEmpty) {
                                    return 'Name is required';
                                  }
                                  return null;
                                },
                                autofocus: true,
                              ),
                              const SizedBox(height: 16),
                              TextFormField(
                                controller: _descriptionController,
                                decoration: const InputDecoration(
                                  labelText: 'Description',
                                  border: OutlineInputBorder(),
                                ),
                                maxLines: 3,
                                textInputAction: TextInputAction.done,
                              ),
                            ],
                          ),
                        ),
                        actions: [
                          TextButton(
                            onPressed: () => Navigator.of(context).pop(),
                            child: const Text('Cancel'),
                          ),
                          ElevatedButton(
                            onPressed: _handleSave,
                            child: Text(isEditing ? 'Update' : 'Add'),
                          ),
                        ],
                      );
                    }

                    void _handleSave() {
                      if (_formKey.currentState?.validate() ?? false) {
                        widget.onSave(
                          _nameController.text.trim(),
                          _descriptionController.text.trim().isEmpty 
                              ? null 
                              : _descriptionController.text.trim(),
                        );
                        Navigator.of(context).pop();
                      }
                    }
                  }

              - file: module_name_search_delegate.dart
                code: |
                  import 'package:flutter/material.dart';
                  import 'package:flutter_riverpod/flutter_riverpod.dart';
                  import '../../../domain/entities/entity.dart';
                  import '../../providers/providers.dart';
                  import '../../widgets/base_widgets.dart';
                  import '../../widgets/shimmer_loading.dart';
                  import 'module_name_item_tile.dart';

                  /// Search delegate for ModuleName
                  class ModuleNameSearchDelegate extends SearchDelegate<ModuleNameEntity?> {
                    String _lastQuery = '';

                    @override
                    List<Widget> buildActions(BuildContext context) {
                      return [
                        IconButton(
                          icon: const Icon(Icons.clear),
                          onPressed: () {
                            query = '';
                            _lastQuery = '';
                            showSuggestions(context);
                          },
                        ),
                      ];
                    }

                    @override
                    Widget buildLeading(BuildContext context) {
                      return IconButton(
                        icon: const Icon(Icons.arrow_back),
                        onPressed: () => close(context, null),
                      );
                    }

                    @override
                    Widget buildResults(BuildContext context) {
                      return _buildSearchResults(context);
                    }

                    @override
                    Widget buildSuggestions(BuildContext context) {
                      if (query.isEmpty) {
                        return const Center(
                          child: Text('Enter a search term to find ModuleName items'),
                        );
                      }
                      return _buildSearchResults(context);
                    }

                    Widget _buildSearchResults(BuildContext context) {
                      return Consumer(
                        builder: (context, ref, child) {
                          // Only trigger search if query has actually changed
                          if (query != _lastQuery) {
                            _lastQuery = query;
                            WidgetsBinding.instance.addPostFrameCallback((_) {
                              if (query.isNotEmpty) {
                                ref.read(searchModuleNameProvider.notifier).search(query);
                              } else {
                                ref.read(searchModuleNameProvider.notifier).clear();
                              }
                            });
                          }

                          final searchState = ref.watch(searchModuleNameProvider);

                          return AsyncStateBuilder<List<ModuleNameEntity>>(
                            state: searchState,
                            builder: (results) {
                              if (results.isEmpty) {
                                return const EmptyStateWidget(
                                  title: 'No results found',
                                  subtitle: 'Try a different search term',
                                  icon: Icons.search_off,
                                );
                              }

                              return ListView.builder(
                                itemCount: results.length,
                                itemBuilder: (context, index) {
                                  final item = results[index];
                                  return ModuleNameItemTile(
                                    item: item,
                                    onTap: () => close(context, item),
                                  );
                                },
                              );
                            },
                            loadingBuilder: () => const ModuleNameShimmerList(itemCount: 5),
                            emptyBuilder: () => const EmptyStateWidget(
                              title: 'No results found',
                              subtitle: 'Try a different search term',
                              icon: Icons.search_off,
                            ),
                          );
                        },
                      );
                    }
                  }

