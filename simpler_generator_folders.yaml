          - file: crud_listener.dart
            code: |
              import 'package:flutter/material.dart';
              import 'package:flutter_riverpod/flutter_riverpod.dart';
              import 'base_widgets.dart';

              /// Listens to CRUD operations and shows appropriate UI feedback
              class ModuleNameOperationListener extends ConsumerWidget {
                final List<ProviderBase> providers;
                final Widget child;
                final String? loadingMessage;
                final String? successMessage;
                final bool useInlineLoading;
                final bool useToastNotifications;

                const ModuleNameOperationListener({
                  super.key,
                  required this.providers,
                  required this.child,
                  this.loadingMessage,
                  this.successMessage,
                  this.useInlineLoading = {% if features.inline_loading %}true{% else %}false{% endif %},
                  this.useToastNotifications = {% if features.toast_notifications %}true{% else %}false{% endif %},
                });

                @override
                Widget build(BuildContext context, WidgetRef ref) {
                  for (final provider in providers) {
                    ref.listen(provider, (previous, next) {
                      _handleStateChange(context, previous, next);
                    });
                  }
                  return child;
                }

                void _handleStateChange(
                  BuildContext context, 
                  AsyncValue? previous, 
                  AsyncValue next,
                ) {
                  // Skip if this is the initial state (no previous state)
                  if (previous == null) return;
                  
                  // Use addPostFrameCallback to defer UI operations until after build
                  WidgetsBinding.instance.addPostFrameCallback((_) {
                    // Check if context is still mounted
                    if (!context.mounted) return;
                    
                    // Show loading dialog only if not using inline loading
                    if (next.isLoading && !previous.isLoading && !useInlineLoading) {
                      showDialog(
                        context: context,
                        barrierDismissible: false,
                        builder: (_) => LoadingOverlay(message: loadingMessage),
                      );
                    }
                    // Handle error
                    else if (next.hasError && previous.isLoading) {
                      // Safely pop dialog if navigation stack is not empty
                      if (!useInlineLoading && Navigator.of(context).canPop()) {
                        Navigator.of(context).pop(); // Close loading dialog
                      }
                      
                      final errorMessage = next.error.toString();
                      
                      if (useToastNotifications) {
                        // TODO: Implement toast notifications
                        // For now, use snackbar
                        _showErrorSnackBar(context, errorMessage);
                      } else {
                        _showErrorSnackBar(context, errorMessage);
                      }
                    }
                    // Handle success
                    else if (next.hasValue && previous.isLoading) {
                      // Safely pop dialog if navigation stack is not empty
                      if (!useInlineLoading && Navigator.of(context).canPop()) {
                        Navigator.of(context).pop(); // Close loading dialog
                      }
                      
                      final message = successMessage ?? 'Operation completed successfully';
                      
                      if (useToastNotifications) {
                        // TODO: Implement toast notifications
                        // For now, use snackbar
                        _showSuccessSnackBar(context, message);
                      } else {
                        _showSuccessSnackBar(context, message);
                      }
                    }
                  });
                }
                
                void _showErrorSnackBar(BuildContext context, String message) {
                  ScaffoldMessenger.of(context).showSnackBar(
                    SnackBar(
                      content: Text(message),
                      backgroundColor: Colors.red,
                      behavior: SnackBarBehavior.floating,
                      action: SnackBarAction(
                        label: 'Dismiss',
                        textColor: Colors.white,
                        onPressed: () {
                          ScaffoldMessenger.of(context).hideCurrentSnackBar();
                        },
                      ),
                    ),
                  );
                }
                
                void _showSuccessSnackBar(BuildContext context, String message) {
                  ScaffoldMessenger.of(context).showSnackBar(
                    SnackBar(
                      content: Text(message),
                      backgroundColor: Colors.green,
                      behavior: SnackBarBehavior.floating,
                      duration: const Duration(seconds: 2),
                    ),
                  );
                }
              }

              /// Multi-provider CRUD listener for complex operations
              class MultiProviderCrudListener extends ConsumerWidget {
                final Map<ProviderBase, CrudListenerConfig> providerConfigs;
                final Widget child;

                const MultiProviderCrudListener({
                  super.key,
                  required this.providerConfigs,
                  required this.child,
                });

                @override
                Widget build(BuildContext context, WidgetRef ref) {
                  for (final entry in providerConfigs.entries) {
                    ref.listen(entry.key, (previous, next) {
                      _handleStateChange(context, previous, next, entry.value);
                    });
                  }
                  return child;
                }

                void _handleStateChange(
                  BuildContext context,
                  AsyncValue? previous,
                  AsyncValue next,
                  CrudListenerConfig config,
                ) {
                  // Skip if this is the initial state (no previous state)
                  if (previous == null) return;
                  
                  // Use addPostFrameCallback to defer UI operations until after build
                  WidgetsBinding.instance.addPostFrameCallback((_) {
                    // Check if context is still mounted
                    if (!context.mounted) return;
                    
                    if (next.isLoading && !previous.isLoading) {
                      showDialog(
                        context: context,
                        barrierDismissible: false,
                        builder: (_) => LoadingOverlay(message: config.loadingMessage),
                      );
                    } else if (next.hasError && previous.isLoading) {
                      // Safely pop dialog if navigation stack is not empty
                      if (Navigator.of(context).canPop()) {
                        Navigator.of(context).pop();
                      }
                      ScaffoldMessenger.of(context).showSnackBar(
                        SnackBar(
                          content: Text(config.errorMessage ?? next.error.toString()),
                          backgroundColor: Colors.red,
                          behavior: SnackBarBehavior.floating,
                        ),
                      );
                    } else if (next.hasValue && previous.isLoading) {
                      // Safely pop dialog if navigation stack is not empty
                      if (Navigator.of(context).canPop()) {
                        Navigator.of(context).pop();
                      }
                      ScaffoldMessenger.of(context).showSnackBar(
                        SnackBar(
                          content: Text(config.successMessage),
                          backgroundColor: Colors.green,
                          behavior: SnackBarBehavior.floating,
                        ),
                      );
                    }
                  });
                }
              }

              /// Configuration for CRUD listener
              class CrudListenerConfig {
                final String? loadingMessage;
                final String successMessage;
                final String? errorMessage;

                const CrudListenerConfig({
                  this.loadingMessage,
                  required this.successMessage,
                  this.errorMessage,
                });
              }
