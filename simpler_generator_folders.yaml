# Template Replacement Rules:
# NAME -> Feature name (e.g., "User", "Product", "Order")
# ModuleName -> PascalCase version of NAME
# module_name -> snake_case version of NAME

# Configuration flags (can be toggled)
features:
  # Architecture complexity
  simple_mode: false              # Generate minimal files only
  clean_architecture: true       # Full Clean Architecture layers
  
  # UI Features
  pagination: true
  forms: true
  filters: true
  preview: true
  shimmer_loading: true
  
  # Data & State Management
  fake_repository: true
  offline_support: false         # Local caching and sync
  optimistic_updates: true       # Update UI immediately, revert on error
  stream_based: false            # Use streams instead of futures
  
  # Error Handling & UX
  advanced_error_handling: true
  retry_mechanisms: false        # Auto-retry failed operations
  inline_loading: true           # Show loading states inline instead of dialogs
  toast_notifications: false     # Use toast instead of snackbars
  
  # Development & Testing
  generic_base_classes: true
  mock_data_generation: true     # Generate realistic mock data
  unit_tests: false              # Generate unit tests
  integration_tests: false       # Generate integration tests
  
  # Code Generation
  asset_generation: false
  json_serialization: true       # Add toJson/fromJson methods
  equatable_support: false       # Add Equatable for value comparison

generate:
  # ===== CORE LAYER =====
  - category: core
    contents:
      - folder: errors
        contents:
          - file: failures.dart
            code: |
              // Base failure class
              abstract class Failure {
                const Failure();
                
                /// User-friendly error message
                String get message;
                
                /// Whether this failure can be retried
                bool get isRetryable => false;
              }

              // Network-related failures
              class NetworkFailure extends Failure {
                final int? statusCode;
                final String? details;
                
                const NetworkFailure({this.statusCode, this.details});
                
                @override
                String get message {
                  if (statusCode != null) {
                    return switch (statusCode!) {
                      400 => 'Invalid request. Please check your input.',
                      401 => 'Authentication required. Please log in.',
                      403 => 'Access denied. You don\'t have permission.',
                      404 => 'The requested resource was not found.',
                      429 => 'Too many requests. Please try again later.',
                      >= 500 => 'Server error. Please try again later.',
                      _ => details ?? 'Network error occurred.',
                    };
                  }
                  return details ?? 'Network connection failed.';
                }
                
                @override
                bool get isRetryable => statusCode == null || statusCode! >= 500 || statusCode == 429;
              }

              class ServerFailure extends Failure {
                final String? details;
                final int? statusCode;
                
                const ServerFailure({this.details, this.statusCode});
                
                @override
                String get message => details ?? 'Server error occurred.';
                
                @override
                bool get isRetryable => true;
              }

              class TimeoutFailure extends Failure {
                const TimeoutFailure();
                
                @override
                String get message => 'Request timed out. Please check your connection.';
                
                @override
                bool get isRetryable => true;
              }

              // Data-related failures
              class CacheFailure extends Failure {
                final String? details;
                
                const CacheFailure([this.details]);
                
                @override
                String get message => details ?? 'Local data error occurred.';
              }

              class ValidationFailure extends Failure {
                final Map<String, String> errors;
                
                const ValidationFailure(this.errors);
                
                @override
                String get message {
                  if (errors.isEmpty) return 'Validation failed.';
                  if (errors.length == 1) return errors.values.first;
                  return 'Please fix the following errors:\n${errors.values.join('\n')}';
                }
                
                /// Get error for specific field
                String? getFieldError(String field) => errors[field];
              }

              class NotFoundFailure extends Failure {
                final String? resource;
                
                const NotFoundFailure([this.resource]);
                
                @override
                String get message => resource != null 
                    ? '$resource not found.' 
                    : 'The requested item was not found.';
              }

              // Permission-related failures
              class UnauthorizedFailure extends Failure {
                const UnauthorizedFailure();
                
                @override
                String get message => 'Please log in to continue.';
              }

              class ForbiddenFailure extends Failure {
                final String? action;
                
                const ForbiddenFailure([this.action]);
                
                @override
                String get message => action != null
                    ? 'You don\'t have permission to $action.'
                    : 'Access denied.';
              }

              // Connection-related failures
              class NoInternetFailure extends Failure {
                const NoInternetFailure();
                
                @override
                String get message => 'No internet connection. Please check your network.';
                
                @override
                bool get isRetryable => true;
              }

              // Generic failure
              class UnexpectedFailure extends Failure {
                final String? details;
                final Exception? exception;
                
                const UnexpectedFailure({this.details, this.exception});
                
                @override
                String get message => details ?? 'An unexpected error occurred.';
                
                @override
                bool get isRetryable => true;
              }

              /// Extension to convert exceptions to failures
              extension ExceptionToFailure on Exception {
                Failure toFailure() {
                  return switch (this) {
                    FormatException() => const ValidationFailure({'format': 'Invalid data format'}),
                    TimeoutException() => const TimeoutFailure(),
                    _ => UnexpectedFailure(exception: this),
                  };
                }
              }

