              import 'package:dartz/dartz.dart';
              import 'package:flutter_riverpod/flutter_riverpod.dart';
              import '../../core/errors/failures.dart';

              /// Base mixin for handling CRUD operations with optimistic updates
              mixin CrudMixin on AsyncNotifier<void> {
                Future<void> handleCrudOperation(
                  Future<Either<Failure, dynamic>> operation, {
                  ProviderBase? refreshProvider,
                  bool showLoading = true,
                  int maxRetries = 0,
                }) async {
                  if (showLoading) {
                    state = const AsyncValue.loading();
                  }
                  
                  int attempts = 0;
                  while (attempts <= maxRetries) {
                    final result = await operation;
                    
                    final newState = result.fold(
                      (failure) {
                        // Check if we should retry
                        if (attempts < maxRetries && failure.isRetryable) {
                          attempts++;
                          return null; // Continue retry loop
                        }
                        return AsyncValue.error(
                          _mapFailureToException(failure), 
                          StackTrace.current,
                        );
                      },
                      (_) => const AsyncValue.data(null),
                    );
                    
                    if (newState != null) {
                      state = newState;
                      break;
                    }
                    
                    // Wait before retry
                    if (attempts <= maxRetries) {
                      await Future.delayed(Duration(milliseconds: 500 * attempts));
                    }
                  }
                  
                  // Refresh related providers on success
                  if (!state.hasError && refreshProvider != null) {
                    ref.invalidate(refreshProvider);
                  }
                }

                Exception _mapFailureToException(Failure failure) {
                  return Exception(failure.message);
                }
              }

              /// Enhanced mixin for optimistic CRUD operations
              mixin OptimisticCrudMixin<T> on AsyncNotifier<List<T>> {
                /// Add item optimistically
                Future<void> addItemOptimistically(
                  T item,
                  Future<Either<Failure, dynamic>> operation,
                  T Function(T) getId,
                ) async {
                  final currentItems = state.value ?? [];
                  
                  // Optimistic update
                  state = AsyncValue.data([...currentItems, item]);
                  
                  final result = await operation;
                  result.fold(
                    (failure) {
                      // Revert on error
                      state = AsyncValue.data(currentItems);
                      // You might want to show error to user here
                    },
                    (_) {
                      // Success - keep the optimistic update
                    },
                  );
                }

                /// Update item optimistically
                Future<void> updateItemOptimistically(
                  T updatedItem,
                  Future<Either<Failure, dynamic>> operation,
                  bool Function(T, T) matcher,
                ) async {
                  final currentItems = state.value ?? [];
                  final index = currentItems.indexWhere((item) => matcher(item, updatedItem));
                  
                  if (index == -1) return;
                  
                  final originalItem = currentItems[index];
                  final newItems = [...currentItems];
                  newItems[index] = updatedItem;
                  
                  // Optimistic update
                  state = AsyncValue.data(newItems);
                  
                  final result = await operation;
                  result.fold(
                    (failure) {
                      // Revert on error
                      final revertedItems = [...newItems];
                      revertedItems[index] = originalItem;
                      state = AsyncValue.data(revertedItems);
                    },
                    (_) {
                      // Success - keep the optimistic update
                    },
                  );
                }

                /// Delete item optimistically
                Future<void> deleteItemOptimistically(
                  bool Function(T) predicate,
                  Future<Either<Failure, dynamic>> operation,
                ) async {
                  final currentItems = state.value ?? [];
                  final itemToDelete = currentItems.where(predicate).firstOrNull;
                  
                  if (itemToDelete == null) return;
                  
                  // Optimistic update
                  state = AsyncValue.data(currentItems.where((item) => !predicate(item)).toList());
                  
                  final result = await operation;
                  result.fold(
                    (failure) {
                      // Revert on error
                      state = AsyncValue.data(currentItems);
                    },
                    (_) {
                      // Success - keep the optimistic update
                    },
                  );
                }
              }

              /// Base class for list notifiers with common functionality
              abstract class BaseListNotifier<T> extends AsyncNotifier<List<T>> {
                Exception mapFailureToException(Failure failure) {
                  return Exception(failure.message);
                }
                
                /// Helper method to handle list operations with proper error handling
                Future<void> handleListOperation(
                  Future<Either<Failure, List<T>>> operation,
                ) async {
                  state = const AsyncValue.loading();
                  final result = await operation;
                  
                  state = result.fold(
                    (failure) => AsyncValue.error(
                      mapFailureToException(failure),
                      StackTrace.current,
                    ),
                    (items) => AsyncValue.data(items),
                  );
                }
              }

